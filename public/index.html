<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitten Catastrophe</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- TITLE SCREEN -->
    <div id="screen-title" class="screen active">
      <div class="title-container">
        <div class="title-logo">
          <img class="logo-img" src="/img/kitten.png" alt="Cute kitten">
          <h1 class="title-text">Kitten<br>Catastrophe</h1>
        </div>
        <div class="title-subtitle">A purrfectly chaotic board game!</div>

        <div class="title-form">
          <input type="text" id="player-name" placeholder="Your kitten name..." maxlength="20" autocomplete="off">
          <button id="btn-create" class="btn btn-primary">Create Room</button>
          <div class="join-row">
            <input type="text" id="join-code" placeholder="ROOM CODE" maxlength="4" class="code-input" autocomplete="off">
            <button id="btn-join" class="btn btn-secondary">Join Room</button>
          </div>
        </div>

        <div class="title-footer">
          <span class="paw"><svg viewBox="0 0 24 24" width="14" height="14"><ellipse cx="12" cy="16" rx="5" ry="4" fill="#a1887f"/><circle cx="7" cy="10" r="2.5" fill="#a1887f"/><circle cx="17" cy="10" r="2.5" fill="#a1887f"/><circle cx="10" cy="7" r="2" fill="#a1887f"/><circle cx="14" cy="7" r="2" fill="#a1887f"/></svg></span> 2-8 players <span class="paw"><svg viewBox="0 0 24 24" width="14" height="14"><ellipse cx="12" cy="16" rx="5" ry="4" fill="#a1887f"/><circle cx="7" cy="10" r="2.5" fill="#a1887f"/><circle cx="17" cy="10" r="2.5" fill="#a1887f"/><circle cx="10" cy="7" r="2" fill="#a1887f"/></svg></span> 3 lives each <span class="paw"><svg viewBox="0 0 24 24" width="14" height="14"><ellipse cx="12" cy="16" rx="5" ry="4" fill="#a1887f"/><circle cx="7" cy="10" r="2.5" fill="#a1887f"/><circle cx="17" cy="10" r="2.5" fill="#a1887f"/><circle cx="10" cy="7" r="2" fill="#a1887f"/></svg></span> Race to escape!
        </div>
      </div>
    </div>

    <!-- WAITING ROOM -->
    <div id="screen-waiting" class="screen">
      <div class="waiting-container">
        <h2>Waiting Room</h2>
        <div class="room-code-box">
          <div class="room-code-label">Room Code:</div>
          <div id="room-code-display" class="room-code" title="Click to copy">----</div>
          <div class="room-code-hint">Share this code with friends!</div>
        </div>
        <div id="player-list" class="player-list"></div>
        <div id="waiting-hint" class="waiting-hint"></div>
        <button id="btn-start" class="btn btn-primary btn-start" style="display:none">Start Game!</button>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="screen-game" class="screen">
      <!-- Main board area fills the screen -->
      <div class="game-board-wrapper">
        <!-- Player display - top right corner overlay -->
        <div id="player-panel" class="player-panel"></div>

        <!-- Turn indicator overlay top-center -->
        <div id="turn-indicator" class="turn-indicator"></div>

        <!-- Board canvas fills this area -->
        <canvas id="board-canvas"></canvas>

        <!-- Dice floats on the board -->
        <div id="dice-container" class="dice-container"></div>
      </div>

      <!-- Cards bar at the bottom -->
      <div class="cards-bar">
        <div class="my-info">
          <span id="my-lives" class="my-lives"></span>
        </div>
        <div id="hand" class="hand"></div>
      </div>

      <!-- Action log - small floating panel -->
      <div id="action-log" class="action-log"></div>
    </div>

    <!-- GAME OVER -->
    <div id="screen-gameover" class="screen">
      <div class="gameover-container">
        <div id="confetti" class="confetti"></div>
        <div class="gameover-kitten">
          <img class="winner-kitten" src="/img/kitten.png" alt="Winner kitten">
        </div>
        <div id="winner-message" class="winner-message"></div>
        <button class="btn btn-primary" onclick="location.reload()">Play Again!</button>
      </div>
    </div>

    <!-- MODAL OVERLAY -->
    <div id="modal" class="modal"></div>

    <!-- TOASTS -->
    <div id="toasts" class="toasts"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/board.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
